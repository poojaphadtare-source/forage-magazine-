<!DOCTYPE html>

<body>

<!-- ─── TOOLBAR ─── -->
<div class="editor-toolbar no-print" id="editorToolbar">
  <div class="toolbar-left">
    <div class="toolbar-brand">
      <span class="toolbar-diamond">◆</span>
      <span class="toolbar-title">FRAMEWORK</span>
      <span class="toolbar-by">by Kilowott</span>
    </div>
  </div>
  <div class="toolbar-right">
    <button class="btn-add-page" id="addPageBtn">+ Add Page</button>
    <button class="btn-pdf" id="pdfBtn">&#128438; Download PDF</button>
  </div>
</div>

<!-- ─── LAYOUT ─── -->
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar no-print" id="sidebar">
    <div class="sidebar-header">
      <span>PAGES</span>
      <div class="sb-header-actions">
        <button class="sb-folder-btn" id="sbNewFolderBtn" title="New Folder">📁+</button>
        <button class="sb-add-btn" id="sbAddBtn">+</button>
      </div>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <!-- Canvas -->
  <main class="pages-container" id="pagesContainer"></main>

</div>

  </div>
  <div class="edit-panel-body" id="editPanelBody"></div>
  <div class="edit-panel-footer">

    <button class="btn-cancel-panel" id="cancelPanelBtn">Cancel</button>
  </div>
</div>

<!-- ─── IMAGE MODAL ─── -->
<div class="modal-overlay hidden" id="imageModal">
  <div class="modal">
    <div class="modal-header">
      <span>Upload Image</span>
      <button class="btn-close-modal" id="closeImageModal">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">&#128247;</div>
        <p>Click or drag an image here</p>
        <small>JPG, PNG, WEBP – max 100MB</small>
        <input type="file" id="imageFileInput" accept="image/*" style="display:none">
      </div>
      <div class="upload-preview hidden" id="uploadPreview">
        <img id="uploadPreviewImg" src="" alt="">
        <p id="uploadPreviewName"></p>
      </div>
      <div class="or-divider">— or paste a URL —</div>
      <input type="url" class="url-input" id="imageUrlInput" placeholder="https://example.com/photo.jpg">
    </div>
    <div class="modal-footer">
      <button class="btn-apply-image" id="applyImageBtn">Apply Image</button>
      <button class="btn-remove-image" id="removeImageBtn">Remove Image</button>
    </div>
  </div>
</div>
